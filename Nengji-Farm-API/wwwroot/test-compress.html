<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上传压缩测试</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; color: #333; }
h1 { margin-bottom: 20px; font-size: 20px; }
.card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.card h2 { font-size: 16px; margin-bottom: 12px; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
input, button { padding: 8px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; }
button { background: #07c; color: #fff; border: none; cursor: pointer; }
button:disabled { opacity: .5; cursor: wait; }
button.danger { background: #e74c3c; }
.progress { width: 100%; margin: 8px 0; }
table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 14px; }
td, th { padding: 6px 8px; text-align: left; border-bottom: 1px solid #eee; }
th { color: #666; font-weight: 500; }
.saved { color: #0a0; font-weight: 600; }
.unsaved { color: #e74c3c; }
.preview { max-width: 100%; max-height: 300px; border-radius: 4px; }
.hidden { display: none; }
.status { padding: 6px 10px; border-radius: 4px; margin: 4px 0; font-size: 13px; }
.status.ok { background: #d4edda; color: #155724; }
.status.err { background: #f8d7da; color: #721c24; }
.status.wait { background: #fff3cd; color: #856404; }
</style>
</head>
<body>

<h1>上传压缩测试</h1>

<!-- Login -->
<div class="card">
  <h2>管理员登录</h2>
  <div class="row">
    <input id="userNo" placeholder="账号" value="admin">
    <input id="password" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
  </div>
  <div id="loginStatus"></div>
  <div id="tokenDisplay" class="hidden" style="margin-top:8px;font-size:12px;color:#888;word-break:break-all"></div>
</div>

<!-- Image Upload -->
<div class="card">
  <h2>图片压缩测试</h2>
  <div class="row">
    <input id="imageFile" type="file" accept="image/*">
    <button onclick="uploadImage()">上传测试</button>
  </div>
  <div id="imageStatus"></div>
  <table id="imageResult" class="hidden">
    <tr><th>原始大小</th><td id="imgOrig"></td></tr>
    <tr><th>压缩后大小</th><td id="imgComp"></td></tr>
    <tr><th>节省</th><td id="imgSaved"></td></tr>
    <tr><th>结果</th><td id="imgUrl"></td></tr>
  </table>
  <img id="imagePreview" class="preview hidden">
</div>

<!-- Video Upload -->
<div class="card">
  <h2>视频压缩测试</h2>
  <div class="row">
    <input id="videoFile" type="file" accept="video/*">
    <button onclick="uploadVideo()">上传测试</button>
  </div>
  <div id="videoStatus"></div>
  <table id="videoResult" class="hidden">
    <tr><th>原始大小</th><td id="vidOrig"></td></tr>
    <tr><th>压缩后大小</th><td id="vidComp"></td></tr>
    <tr><th>节省</th><td id="vidSaved"></td></tr>
    <tr><th>结果</th><td id="vidUrl"></td></tr>
  </table>
  <video id="videoPreview" class="preview hidden" controls></video>
</div>

<script>
let TOKEN = '';

async function login() {
  const btn = event.target; btn.disabled = true;
  const status = document.getElementById('loginStatus');
  try {
    const r = await fetch('/api/back-user/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_no: userNo.value, password: password.value })
    });
    const d = await r.json();
    if (d.code === 200 && d.data?.token) {
      TOKEN = d.data.token;
      status.innerHTML = '<div class="status ok">登录成功</div>';
      document.getElementById('tokenDisplay').textContent = 'Token: ' + TOKEN.substring(0, 20) + '...';
      document.getElementById('tokenDisplay').classList.remove('hidden');
    } else {
      status.innerHTML = '<div class="status err">登录失败: ' + (d.message || '未知错误') + '</div>';
    }
  } catch(e) {
    status.innerHTML = '<div class="status err">请求失败: ' + e.message + '</div>';
  }
  btn.disabled = false;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

async function upload(endpoint, fileInput, statusId, previewEl, resultTable, sizeFields) {
  if (!TOKEN) { document.getElementById(statusId).innerHTML = '<div class="status err">请先登录</div>'; return; }
  const file = fileInput.files[0];
  if (!file) { document.getElementById(statusId).innerHTML = '<div class="status err">请选择文件</div>'; return; }

  const btn = event.target; btn.disabled = true;
  const status = document.getElementById(statusId);
  status.innerHTML = '<div class="status wait">上传中...</div>';

  const origSize = file.size;
  const formData = new FormData();
  formData.append('file', file);

  try {
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: { 'token': TOKEN },
      body: formData
    });
    const d = await r.json();

    if (d.code === 0 && d.data) {
      // Get the compressed file size by fetching it
      const fileUrl = typeof d.data === 'string' ? d.data : d.data.url;
      let compSize = 'unknown';
      try {
        const headR = await fetch(fileUrl, { method: 'HEAD' });
        compSize = parseInt(headR.headers.get('Content-Length') || '0');
      } catch(e) { /* HEAD might not work */ }

      // If HEAD failed, try to get size from Content-Range or do a partial fetch
      if (!compSize || compSize === 0) {
        try {
          const rangeR = await fetch(fileUrl, { headers: { 'Range': 'bytes=0-0' } });
          const total = rangeR.headers.get('Content-Range');
          if (total) compSize = parseInt(total.split('/')[1]);
        } catch(e) {}
      }

      const saved = origSize - compSize;
      const pct = ((saved / origSize) * 100).toFixed(1);

      document.getElementById(sizeFields.orig).textContent = formatSize(origSize);
      document.getElementById(sizeFields.comp).textContent = compSize > 0 ? formatSize(compSize) : '未知';
      document.getElementById(sizeFields.saved).textContent = compSize > 0
        ? `<span class="${saved > 0 ? 'saved' : 'unsaved'}">${pct}% (${formatSize(Math.abs(saved))})</span>`
        : '无法确认（可能需刷新页面）';
      document.getElementById(sizeFields.url).textContent = fileUrl;

      document.getElementById(resultTable).classList.remove('hidden');

      if (previewEl.tagName === 'IMG') {
        previewEl.src = fileUrl;
        previewEl.classList.remove('hidden');
      } else {
        previewEl.src = fileUrl;
        previewEl.classList.remove('hidden');
      }

      status.innerHTML = '<div class="status ok">上传成功</div>';
    } else {
      status.innerHTML = '<div class="status err">上传失败: ' + (d.message || JSON.stringify(d)) + '</div>';
    }
  } catch(e) {
    status.innerHTML = '<div class="status err">请求失败: ' + e.message + '</div>';
  }
  btn.disabled = false;
}

function uploadImage() {
  upload('/api/common/upload', document.getElementById('imageFile'), 'imageStatus',
    document.getElementById('imagePreview'), 'imageResult',
    { orig: 'imgOrig', comp: 'imgComp', saved: 'imgSaved', url: 'imgUrl' });
}

function uploadVideo() {
  upload('/api/common/upload', document.getElementById('videoFile'), 'videoStatus',
    document.getElementById('videoPreview'), 'videoResult',
    { orig: 'vidOrig', comp: 'vidComp', saved: 'vidSaved', url: 'vidUrl' });
}

// Enter key to login
document.addEventListener('keydown', e => { if (e.key === 'Enter' && !TOKEN) login(); });
</script>
</body>
</html>
