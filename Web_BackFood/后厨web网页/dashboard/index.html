<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后厨出餐管理系统 - 首页</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="header-buttons">
        <button class="logout" onclick="logout()">退出登录</button>
    </div>
    <div class="container">
        <div class="header">
            <h1>后厨出餐管理</h1>
            <div class="header-right">
                <div class="user-info">
                    当前用户: <strong><span id="current-username"></span></strong>
                </div>
                <div class="revenue">
                    今日营业额: <strong>¥<span id="total-revenue">0</span></strong>
                </div>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('pending')">待出餐</div>
            <div class="tab" onclick="switchTab('completed')">已出餐</div>
        </div>
        <div class="order-list" id="order-list">
            <!-- 订单列表将通过JavaScript动态生成 -->
        </div>
    </div>
    <script src="js/dashboard.js"></script>
</body>
</html>
