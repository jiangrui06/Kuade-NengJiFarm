<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后厨出餐管理系统 - 订单详情</title>
    <link rel="stylesheet" href="css/order-detail.css">
</head>
<body>
    <div class="container">
        <button class="back-button" onclick="goBack()">返回首页</button>
        <div class="header">
            <div class="header-top">
                <h1>订单详情</h1>
                <div class="user-info">
                    当前用户: <strong><span id="current-username"></span></strong>
                </div>
            </div>
            <div class="order-info">
                <span><strong>订单号:</strong> <span id="order-id"></span></span>
                <span><strong>下单时间:</strong> <span id="order-time"></span></span>
            </div>
            <div class="order-info">
                <span><strong>桌号/取餐号:</strong> <span id="table-number"></span></span>
            </div>
        </div>
        <div class="items-list" id="items-list">
            <!-- 菜品列表将通过JavaScript动态生成 -->
        </div>
        <div class="error-message" id="error-message">操作失败，请重试</div>
    </div>
    <script src="js/order-detail.js"></script>
</body>
</html>
