<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>农场管理后台 - 登录</title>
	<script src="js/v3.2.8/vue.global.prod.js" type="text/javascript" charset="utf-8"></script>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			font-family: "Microsoft YaHei", sans-serif;
			background:
				radial-gradient(circle at top, rgba(211, 162, 57, 0.15), transparent 40%),
				linear-gradient(135deg, #fff9e6 0%, #f9e7c7 45%, #f0d9a9 100%);
		}

		.login-bg {
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 24px;
			background:
				linear-gradient(rgba(255, 249, 230, 0.22), rgba(249, 231, 199, 0.38)),
				url('') center center / cover no-repeat;
		}

		.login-container {
			width: min(100%, 420px);
			padding: 40px 32px;
			border-radius: 16px;
			background: rgba(255, 255, 255, 0.92);
			box-shadow: 0 20px 50px rgba(230, 184, 70, 0.15);
			backdrop-filter: blur(12px);
		}

		.login-title {
			font-size: 28px;
			font-weight: 700;
			text-align: center;
			color: rgba(184, 143, 46, 0.9);
		}

		.login-subtitle {
			margin-top: 10px;
			margin-bottom: 28px;
			font-size: 14px;
			line-height: 1.6;
			text-align: center;
			color: #8B7355;
		}

		.login-input-group {
			margin-bottom: 18px;
		}

		.login-input-group label {
			display: block;
			margin-bottom: 8px;
			color: #8B7355;
			font-size: 14px;
			font-weight: 600;
		}

		.login-input-group input {
			width: 100%;
			padding: 12px 14px;
			border: 1px solid #f0d9a9;
			border-radius: 10px;
			font-size: 15px;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}

		.login-input-group input:focus {
			border-color: #E5B846;
			box-shadow: 0 0 0 4px rgba(230, 184, 70, 0.15);
		}

		.login-btn {
			width: 100%;
			padding: 13px;
			margin-top: 8px;
			border: none;
			border-radius: 10px;
			background: linear-gradient(135deg, #E5B846 0%, #D3A239 100%);
			color: #fff;
			font-size: 16px;
			font-weight: 700;
			cursor: pointer;
			transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
		}

		.login-btn:hover:not(:disabled) {
			transform: translateY(-1px);
			box-shadow: 0 12px 24px rgba(230, 184, 70, 0.25);
		}

		.login-btn:disabled {
			opacity: 0.7;
			cursor: not-allowed;
		}

		.error {
			min-height: 22px;
			margin-top: 14px;
			padding: 8px 10px;
			font-size: 14px;
			line-height: 1.5;
			text-align: center;
			color: #9a5b3a;
			background: rgba(205, 153, 120, 0.12);
			border-radius: 8px;
		}
	</style>
</head>
<body>
	<div id="app">
		<div class="login-bg">
			<div class="login-container">
				<div class="login-title">农场管理后台</div>
				<div class="login-subtitle">请输入管理员账号和密码登录系统</div>
				<form @submit.prevent="login">
					<div class="login-input-group">
						<label for="phone">账号</label>
						<input
							id="id"
							v-model.trim="loginForm.user_no"
							type="text"
							placeholder="请输入账号"
							autocomplete="username"
						/>
					</div>
					<div class="login-input-group">
						<label for="password">密码</label>
						<input
							id="password"
							v-model="loginForm.password"
							type="password"
							placeholder="请输入密码"
							autocomplete="current-password"
						/>
					</div>
					<button class="login-btn" type="submit" :disabled="loading">
						{{ loading ? '登录中...' : '登录' }}
					</button>
					<div v-if="errorMessage" class="error">{{ errorMessage }}</div>
				</form>
			</div>
		</div>
	</div>

	<script>
		const { createApp } = Vue;

		createApp({
			data() {
				return {
					loading: false,
					errorMessage: '',
					loginForm: {
						user_no: '',
						password: ''
					}
				};
			},
			methods: {
				async login() {
					const user_no = this.loginForm.user_no.trim();
					const password = this.loginForm.password;

					this.loading = true;
					this.errorMessage = '';

					try {
						const response = await fetch('http://192.168.101.30:7240/api/back-user/login', {
							method: 'POST',
							headers: {
								'Content-Type': 'application/json'
							},
							body: JSON.stringify({
								user_no: this.loginForm.user_no,
								password: this.loginForm.password
							})
						});

						const result = await response.json();

						if (response.ok && result.code === 200 && result.data) {
							const userInfo = {
								...result.data,
								user_no: result.data.user_no || result.data.account || user_no
							};
							localStorage.setItem('token', result.data.token || '');
							localStorage.setItem('userInfo', JSON.stringify(userInfo));
							console.log('token:', result.data.token);
							console.log('userInfo:', userInfo);
							window.location.href = 'product.html';
							return;
						}

						this.errorMessage = result.message || '登录失败，请重试';
					} catch (error) {
						console.error('Login request failed:', error);
						this.errorMessage = `${error}`;
					} finally {
						this.loading = false;
					}
				}
			}
		}).mount('#app');
	</script>
</body>
</html>
