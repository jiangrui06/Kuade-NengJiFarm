<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>农场管理后台 - 登录</title>
		<script src="js/v3.2.8/vue.global.prod.js" type="text/javascript" charset="utf-8"></script>
	</head>
	
	<style>
		*{
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		body{
			height:100vh;
			font-family:"Microsoft YaHei";
		}
		
		.login-bg{
			height:100vh;
			display:flex;
			justify-content:center;
			align-items:center;
			background-image: url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=green%20farm%20landscape%20with%20mountains%20and%20trees%2C%20beautiful%20nature%20scene%2C%20high%20quality%20photograph&image_size=landscape_16_9');
			background-size: cover;
			background-position: center;
		}
		
		.login-container{
			background: rgba(255, 255, 255, 0.8);
			padding: 40px;
			border-radius: 10px;
			box-shadow: 0 0 20px rgba(0,0,0,0.2);
			width: 400px;
			text-align: center;
		}
		
		.login-title{
			font-size: 24px;
			font-weight: bold;
			margin-bottom: 30px;
			color: #333;
		}
		
		.login-input-group{
			margin-bottom: 20px;
			text-align: left;
		}
		
		.login-input-group label{
			display: block;
			margin-bottom: 5px;
			color: #333;
		}
		
		.login-input-group input{
			width: 100%;
			padding: 10px;
			border: 1px solid #ddd;
			border-radius: 5px;
			font-size: 16px;
		}
		
		.login-btn{
			width: 100%;
			padding: 12px;
			background: #3a6fd8;
			color: white;
			border: none;
			border-radius: 5px;
			font-size: 16px;
			cursor: pointer;
			margin-top: 20px;
		}
		
		.login-btn:hover{
			background: #2d5ec4;
		}
	</style>
	
	<body>
		<div id="app">
			<div class="login-bg">
				<div class="login-container">
					<div class="login-title">农场管理后台</div>
					<div class="login-input-group">
						<label>账号：</label>
						<input type="text" placeholder="请输入账号" v-model="loginForm.username" />
					</div>
					<div class="login-input-group">
						<label>密码：</label>
						<input type="password" placeholder="请输入密码" v-model="loginForm.password" />
					</div>
					<button class="login-btn" @click="login">登录</button>
				</div>
			</div>
		</div>
		
		<script>
			const { createApp } = Vue
			
			createApp({
				data() {
					return {
						loginForm: {
							username: '',
							password: ''
						}
					}
				},
				methods: {
					login() {
						// 简单的登录验证
						if (this.loginForm.username && this.loginForm.password) {
							// 跳转到产品管理页面
							window.location.href = 'product.html';
						}
					}
				}
			}).mount('#app')
		</script>
	</body>
</html>
