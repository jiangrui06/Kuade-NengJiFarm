<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>农场管理后台 - 登录</title>
	<script src="js/v3.2.8/vue.global.prod.js" type="text/javascript" charset="utf-8"></script>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			font-family: "Microsoft YaHei", sans-serif;
			background:
				radial-gradient(circle at top, rgba(107, 162, 91, 0.28), transparent 40%),
				linear-gradient(135deg, #eef7eb 0%, #dbead2 45%, #c6dfbd 100%);
		}

		.login-bg {
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 24px;
			background:
				linear-gradient(rgba(241, 247, 236, 0.22), rgba(231, 241, 224, 0.38)),
				url('https://commons.wikimedia.org/wiki/Special:FilePath/Farm%20landscape%20-%20geograph.org.uk%20-%205303024.jpg') center center / cover no-repeat;
		}

		.login-container {
			width: min(100%, 420px);
			padding: 40px 32px;
			border-radius: 16px;
			background: rgba(255, 255, 255, 0.92);
			box-shadow: 0 20px 50px rgba(57, 86, 46, 0.18);
			backdrop-filter: blur(12px);
		}

		.login-title {
			font-size: 28px;
			font-weight: 700;
			text-align: center;
			color: #234126;
		}

		.login-subtitle {
			margin-top: 10px;
			margin-bottom: 28px;
			font-size: 14px;
			line-height: 1.6;
			text-align: center;
			color: #5c7057;
		}

		.login-input-group {
			margin-bottom: 18px;
		}

		.login-input-group label {
			display: block;
			margin-bottom: 8px;
			color: #355533;
			font-size: 14px;
			font-weight: 600;
		}

		.login-input-group input {
			width: 100%;
			padding: 12px 14px;
			border: 1px solid #cad9c4;
			border-radius: 10px;
			font-size: 15px;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}

		.login-input-group input:focus {
			border-color: #5d8d51;
			box-shadow: 0 0 0 4px rgba(93, 141, 81, 0.12);
		}

		.login-btn {
			width: 100%;
			padding: 13px;
			margin-top: 8px;
			border: none;
			border-radius: 10px;
			background: linear-gradient(135deg, #5d8d51 0%, #3d6d32 100%);
			color: #fff;
			font-size: 16px;
			font-weight: 700;
			cursor: pointer;
			transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
		}

		.login-btn:hover:not(:disabled) {
			transform: translateY(-1px);
			box-shadow: 0 12px 24px rgba(61, 109, 50, 0.2);
		}

		.login-btn:disabled {
			opacity: 0.7;
			cursor: not-allowed;
		}

		.error {
			min-height: 22px;
			margin-top: 14px;
			padding: 8px 10px;
			font-size: 14px;
			line-height: 1.5;
			text-align: center;
			color: #9a5b3a;
			background: rgba(205, 153, 120, 0.12);
			border-radius: 8px;
		}
	</style>
</head>
<body>
	<div id="app">
		<div class="login-bg">
			<div class="login-container">
				<div class="login-title">农场管理后台</div>
				<div class="login-subtitle">请输入管理员手机号和密码登录系统</div>
				<form @submit.prevent="login">
					<div class="login-input-group">
						<label for="phone">手机号</label>
						<input
							id="phone"
							v-model.trim="loginForm.phone"
							type="text"
							placeholder="请输入手机号"
							autocomplete="username"
						/>
					</div>
					<div class="login-input-group">
						<label for="password">密码</label>
						<input
							id="password"
							v-model="loginForm.password"
							type="password"
							placeholder="请输入密码"
							autocomplete="current-password"
						/>
					</div>
					<button class="login-btn" type="submit" :disabled="loading">
						{{ loading ? '登录中...' : '登录' }}
					</button>
					<div v-if="errorMessage" class="error">{{ errorMessage }}</div>
				</form>
			</div>
		</div>
	</div>

	<script>
		const { createApp } = Vue;

		createApp({
			data() {
				return {
					loading: false,
					errorMessage: '',
					loginForm: {
						phone: '',
						password: ''
					}
				};
			},
			methods: {
				async login() {
					const phone = this.loginForm.phone.trim();
					const password = this.loginForm.password;

					if (!phone) {
						this.errorMessage = '手机号不能为空';
						return;
					}

					if (!/^\d{11}$/.test(phone)) {
						this.errorMessage = '请输入正确的 11 位手机号';
						return;
					}

					if (!password) {
						this.errorMessage = '密码不能为空';
						return;
					}

					this.loading = true;
					this.errorMessage = '';

					try {
						const response = await fetch('https://localhost:7138/api/user/login', {
							method: 'POST',
							headers: {
								'Content-Type': 'application/json'
							},
							body: JSON.stringify({
								phone: this.loginForm.phone,
								password: this.loginForm.password
							})
						});

						const result = await response.json();

						if (response.ok && result.code === 200 && result.data) {
							localStorage.setItem('token', result.data.token || '');
							localStorage.setItem('userInfo', JSON.stringify(result.data));
							console.log('token:', result.data.token);
							console.log('userInfo:', result.data);
							window.location.href = 'product.html';
							return;
						}

						this.errorMessage = result.message || '登录失败，请重试';
					} catch (error) {
						console.error('Login request failed:', error);
						this.errorMessage = '无法连接登录接口，请确认后端服务已启动';
					} finally {
						this.loading = false;
					}
				}
			}
		}).mount('#app');
	</script>
</body>
</html>
