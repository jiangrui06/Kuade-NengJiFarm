<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>微信扫码点餐</title>
		<style>
			:root{
				--paddy-bg-top: #fbf5de;
				--paddy-bg-mid: #f4ecd0;
				--paddy-bg-bottom: #efe3b8;
				--paddy-card: rgba(255, 252, 245, 0.94);
				--paddy-card-border: #ead9aa;
				--paddy-badge-bg: #f4e8b5;
				--paddy-badge-text: #8b6a18;
				--paddy-title: #5b4718;
				--paddy-text: #736245;
				--paddy-highlight-a: #b89a43;
				--paddy-highlight-b: #8ca44e;
				--paddy-item-bg: #fff9ea;
				--paddy-item-border: #e8dab0;
				--paddy-label: #9a7b32;
				--paddy-value: #4f3d17;
				--paddy-notice-bg: #f9efc8;
				--paddy-notice-border: #e3cf86;
				--paddy-notice-text: #7a6121;
				--paddy-footer: #8b7a5f;
			}

			*{
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body{
				min-height: 100vh;
				font-family: "Microsoft YaHei", sans-serif;
				background:
					radial-gradient(circle at top left, rgba(184, 154, 67, 0.24), transparent 34%),
					radial-gradient(circle at top right, rgba(140, 164, 78, 0.18), transparent 28%),
					linear-gradient(180deg, var(--paddy-bg-top) 0%, var(--paddy-bg-mid) 50%, var(--paddy-bg-bottom) 100%);
				color: var(--paddy-value);
			}

			.page{
				min-height: 100vh;
				padding: 28px 18px 40px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.scan-card{
				width: min(100%, 460px);
				background: var(--paddy-card);
				backdrop-filter: blur(10px);
				border-radius: 24px;
				padding: 26px 22px;
				box-shadow: 0 18px 40px rgba(135, 109, 36, 0.14);
				border: 1px solid var(--paddy-card-border);
			}

			.badge{
				display: inline-flex;
				align-items: center;
				padding: 7px 12px;
				border-radius: 999px;
				background: var(--paddy-badge-bg);
				color: var(--paddy-badge-text);
				font-size: 12px;
				font-weight: 700;
				letter-spacing: 0.04em;
			}

			.title{
				margin-top: 18px;
				font-size: 30px;
				line-height: 1.2;
				font-weight: 800;
				color: var(--paddy-title);
			}

			.subtitle{
				margin-top: 12px;
				font-size: 14px;
				line-height: 1.7;
				color: var(--paddy-text);
			}

			.table-no{
				margin-top: 22px;
				padding: 18px 20px;
				border-radius: 20px;
				background: linear-gradient(135deg, var(--paddy-highlight-a) 0%, var(--paddy-highlight-b) 100%);
				color: white;
				box-shadow: 0 12px 24px rgba(146, 123, 44, 0.22);
			}

			.table-no-label{
				font-size: 12px;
				opacity: 0.86;
				letter-spacing: 0.08em;
			}

			.table-no-value{
				margin-top: 8px;
				font-size: 34px;
				font-weight: 800;
				letter-spacing: 0.04em;
			}

			.info-grid{
				margin-top: 18px;
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 12px;
			}

			.info-item{
				padding: 14px 14px 16px;
				border-radius: 16px;
				background: var(--paddy-item-bg);
				border: 1px solid var(--paddy-item-border);
			}

			.info-label{
				display: block;
				font-size: 12px;
				font-weight: 700;
				color: var(--paddy-label);
			}

			.info-value{
				margin-top: 8px;
				font-size: 16px;
				font-weight: 700;
				color: var(--paddy-value);
				line-height: 1.5;
				word-break: break-word;
			}

			.notice{
				margin-top: 18px;
				padding: 16px;
				border-radius: 18px;
				background: var(--paddy-notice-bg);
				border: 1px solid var(--paddy-notice-border);
				color: var(--paddy-notice-text);
				font-size: 13px;
				line-height: 1.8;
			}

			.footer{
				margin-top: 18px;
				font-size: 12px;
				line-height: 1.7;
				color: var(--paddy-footer);
				text-align: center;
			}

			.invalid{
				text-align: center;
				padding: 24px 10px 6px;
			}

			.invalid-title{
				font-size: 28px;
				font-weight: 800;
				color: #8b6a18;
			}

			.invalid-text{
				margin-top: 12px;
				font-size: 14px;
				line-height: 1.8;
				color: #7f6d4f;
			}

			@media (max-width: 480px){
				.title{
					font-size: 26px;
				}

				.info-grid{
					grid-template-columns: 1fr;
				}

				.table-no-value{
					font-size: 30px;
				}
			}
		</style>
	</head>
	<body>
		<div class="page">
			<div class="scan-card" id="scanCard">
				<span class="badge" id="badge">微信扫一扫已进入</span>
				<h1 class="title" id="title">欢迎进入餐桌点餐页</h1>
				<p class="subtitle" id="subtitle">已识别当前餐桌信息，可继续接入用户点餐、下单和支付流程。</p>

				<div class="table-no" id="tableInfoBlock">
					<div class="table-no-label">餐桌编号</div>
					<div class="table-no-value" id="tableId">--</div>
				</div>

				<div class="info-grid" id="infoGrid">
					<div class="info-item">
						<span class="info-label">区域</span>
						<div class="info-value" id="area">--</div>
					</div>
					<div class="info-item">
						<span class="info-label">餐桌类型</span>
						<div class="info-value" id="type">--</div>
					</div>
					<div class="info-item">
						<span class="info-label">容纳人数</span>
						<div class="info-value" id="capacity">--</div>
					</div>
					<div class="info-item">
						<span class="info-label">当前状态</span>
						<div class="info-value" id="status">--</div>
					</div>
					<div class="info-item" style="grid-column: 1 / -1;">
						<span class="info-label">点餐码状态</span>
						<div class="info-value" id="codeStatus">--</div>
					</div>
				</div>

				<div class="notice" id="notice">
					微信扫一扫已支持识别到餐桌落地页。后续如果你要继续做“菜品展示、加入购物车、微信支付、订单查询”，可以直接在这个页面基础上接用户端接口。
				</div>

				<div class="footer" id="footerText">
					农场餐饮扫码页
				</div>
			</div>
		</div>

		<script>
			(function () {
				const params = new URLSearchParams(window.location.search);
				const tableId = params.get('tableId') || '';
				const area = params.get('area') || '';
				const type = params.get('type') || '';
				const capacity = params.get('capacity') || '';
				const status = params.get('status') || '';
				const codeStatus = params.get('codeStatus') || '';
				const isWeChat = /MicroMessenger/i.test(window.navigator.userAgent);

				const badge = document.getElementById('badge');
				const title = document.getElementById('title');
				const subtitle = document.getElementById('subtitle');
				const tableIdEl = document.getElementById('tableId');
				const areaEl = document.getElementById('area');
				const typeEl = document.getElementById('type');
				const capacityEl = document.getElementById('capacity');
				const statusEl = document.getElementById('status');
				const codeStatusEl = document.getElementById('codeStatus');
				const notice = document.getElementById('notice');
				const footerText = document.getElementById('footerText');
				const scanCard = document.getElementById('scanCard');

				badge.textContent = isWeChat ? '微信扫一扫已进入' : '扫码页已打开';

				if (!tableId) {
					document.title = '无效二维码';
					scanCard.innerHTML = `
						<div class="invalid">
							<div class="invalid-title">二维码无效</div>
							<div class="invalid-text">当前链接未携带餐桌信息，请返回重新扫码，或联系管理员重新生成餐桌二维码。</div>
						</div>
					`;
					return;
				}

				document.title = `餐桌 ${tableId} - 微信扫码点餐`;
				title.textContent = isWeChat ? '微信扫码成功' : '餐桌扫码成功';
				subtitle.textContent = '已为你识别当前餐桌，可用于点餐、核桌和后续订单流程。';
				tableIdEl.textContent = tableId;
				areaEl.textContent = area || '未设置';
				typeEl.textContent = type || '未设置';
				capacityEl.textContent = capacity ? `${capacity} 人` : '未设置';
				statusEl.textContent = status || '未设置';
				codeStatusEl.textContent = codeStatus || '未设置';
				notice.textContent = `当前餐桌为 ${tableId}，微信扫一扫已可直接打开本页。后续如需继续接用户点餐、购物车、微信支付，可在本页继续扩展。`;
				footerText.textContent = isWeChat ? '当前为微信内打开' : '当前为浏览器打开';
			})();
		</script>
	</body>
</html>
