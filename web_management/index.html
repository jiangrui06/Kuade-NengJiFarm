<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>农场管理后台</title>
		<!-- <script src="https://unpkg.com/vue@next"></script> -->
		<script src="js/v3.2.8/vue.global.prod.js" type="text/javascript" charset="utf-8"></script>
	</head>
	
	<style>
		*{
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		body{
			height:100vh;
			font-family:"Microsoft YaHei";
			background:#f5f7fa;
			display:flex;
			justify-content:center;
			align-items:center;
		}
		
		.bg{
		    height:100vh;
		    display:flex;
		    justify-content:center;
		    align-items:center;
		    background:#f5f7fa;
		}
		
		/* 登录框 */
		.login-box{
			width:642px;
			height:780px;
			padding:80px 100px;
			background:#fff;
			border-radius:12px;
			box-shadow:0 10px 30px rgba(0,0,0,0.1);
			display:flex;
			flex-direction:column;
			justify-content:flex-start;
		}
		
		/* 标题 */
		.title{
			text-align:center;
			font-size:30px;
			font-weight:bold;
			margin-bottom:60px;
		}
		
		/* 输入行 */
		.input-item{
			display:flex;
			align-items:center;
			margin-bottom:20%;
			font-size:26px;
		}
		
		/* label */
		.input-item label{
			width:60px;
			color:#333;
			font-size:19px;
			font-weight: bold;
		}
	
		/* 输入框 */
		.input-item input{
		    flex:1;
		    border:none;                /* 去掉全部边框 */
		    border-bottom:1px solid #333; /* 只保留底部横线 */
		    outline:none;
		    font-size:26px;
		    padding:8px 5px;
		    background:transparent;
		}
		
		/* 输入框聚焦 */
		.input-item input:focus{
			border-color:#3a6fd8;
		}
		
		.zptext{
			width: 80%;
		}
		
		/* 登录按钮 */
		.login-btn{
			width:85%;
			height:71px;
			margin-top:60px;
			background:#3a6fd8;
			color:#fff;
			border:none;
			border-radius:6px;
			font-size:16px;
			cursor:pointer;
			font-size: 25px;
			align-self: center;
		}
		
		.login-btn:hover{
			background:#2d5ec4;
		}
	</style>
	
	<body>
		<div id="app">
			<div class="bg">
				<div class="login-box">
					<div class="title">
						农场管理后台
					</div>
					
					<div class="input-item">
						<label for="">账号：</label>
						<input type="text" placeholder="请输入账号" v-model="username" class="zptext"/>
					</div>
					
					<div class="input-item">
						<label for="">密码：</label>
						<input type="password" placeholder="请输入密码" v-model="password" class="zptext"/>
					</div>
					
					<button class="login-btn" @click="login">登录</button>  <!-- 登录按钮 -->
				</div>
			</div>
		</div>
		<script>
	
		</script>
	</body>
</html>
